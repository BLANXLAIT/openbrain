<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Brain — Agent Bus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem;
    }
    header {
      border-bottom: 1px solid #21262d;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    h1 { color: #58a6ff; font-size: 1.5rem; }
    #summary-line {
      color: #8b949e;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    h2 {
      color: #58a6ff;
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    .section { margin-bottom: 2rem; }
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .agent-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 1rem;
    }
    .agent-card .agent-name {
      color: #58a6ff;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }
    .agent-card .agent-stat {
      color: #8b949e;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
    }
    .timeline { list-style: none; }
    .timeline li {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .timeline .meta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
    }
    .timeline .meta .agent { color: #58a6ff; font-weight: 600; }
    .timeline .meta .type {
      background: #21262d;
      color: #8b949e;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
    }
    .timeline .meta .time { color: #484f58; }
    .timeline .content-preview {
      color: #c9d1d9;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    footer {
      border-top: 1px solid #21262d;
      padding-top: 1rem;
      color: #484f58;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #238636;
    }
    .dot.loading {
      background: #d29922;
      animation: pulse 0.6s infinite alternate;
    }
    @keyframes pulse { to { opacity: 0.4; } }
    .empty-state {
      color: #484f58;
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }
    #error-banner {
      display: none;
      background: #3d1a1a;
      border: 1px solid #6e3630;
      color: #f85149;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    /* Setup form */
    #setup {
      max-width: 480px;
      margin: 4rem auto;
      text-align: center;
    }
    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: #161b22;
      border: 1px solid #21262d;
      color: #c9d1d9;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .social-btn:hover { border-color: #58a6ff; }
    .social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: #484f58;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      border-top: 1px solid #21262d;
    }
    #setup input {
      background: #161b22;
      border: 1px solid #21262d;
      color: #c9d1d9;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      width: 100%;
      font-size: 0.95rem;
    }
    #setup input:focus { outline: 1px solid #58a6ff; }
    #setup button.connect-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0.75rem;
    }
    #setup button.connect-btn:hover { background: #2ea043; }
    #setup .hint {
      color: #484f58;
      font-size: 0.8rem;
      margin-top: 0.75rem;
    }
    #user-info {
      display: none;
      align-items: center;
      gap: 0.75rem;
      margin-left: auto;
    }
    #user-info img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    #user-info span { color: #8b949e; font-size: 0.85rem; }
    #user-info button {
      background: none;
      border: 1px solid #21262d;
      color: #8b949e;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #user-info button:hover { border-color: #f85149; color: #f85149; }
    header { display: flex; align-items: center; flex-wrap: wrap; gap: 1rem; }
    header > div:first-of-type { flex: 1; }
    #setup { display: none; }
    #dashboard { display: none; }
  </style>
</head>
<body>
  <!-- Setup screen: shown when no key is configured -->
  <div id="setup">
    <h1>Open Brain — Agent Bus</h1>
    <p style="color: #8b949e; margin-top: 1rem;">Sign in to view the dashboard.</p>

    <div class="social-buttons">
      <button class="social-btn" id="github-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Sign in with GitHub
      </button>
      <button class="social-btn" id="google-btn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
    </div>

    <div class="divider">or use an API key</div>

    <input type="password" id="key-input" placeholder="API key" autocomplete="off">
    <br>
    <button class="connect-btn" id="connect-btn">Connect</button>
    <div class="hint">Key is stored in localStorage for convenience.</div>
  </div>

  <!-- Dashboard: shown after auth -->
  <div id="dashboard">
    <header>
      <div>
        <h1>Open Brain — Agent Bus</h1>
        <div id="summary-line">Loading...</div>
      </div>
      <div id="user-info">
        <img id="user-avatar" src="" alt="">
        <span id="user-name"></span>
        <button id="sign-out-btn">Sign out</button>
      </div>
    </header>

    <div id="error-banner"></div>

    <div class="section">
      <h2>Agents</h2>
      <div id="agent-grid" class="agent-grid">
        <div class="empty-state">Loading agents...</div>
      </div>
    </div>

    <div class="section">
      <h2>Recent Thoughts</h2>
      <ul id="timeline" class="timeline">
        <li class="empty-state">Loading timeline...</li>
      </ul>
    </div>

    <footer>
      <div class="refresh-indicator">
        <div id="status-dot" class="dot"></div>
        <span id="refresh-text">Auto-refresh in 30s</span>
      </div>
      <span>Open Brain Dashboard</span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"
          integrity="sha384-nBSomYN4UWX4we7Pw5GsQDkjtwLh2Wde+3szWl5Lzf0zuN9XncHIZLNoucos4C7f"
          crossorigin="anonymous"></script>
  <script>
    // --- Config ---
    // Set these to your Supabase project values.
    // The anon key is safe to expose in client-side code.
    const DEFAULT_PROJECT_REF = "jelrcskaoohajhpkwgnk";
    const DEFAULT_ANON_KEY = ""; // pass ?anon_key= in the URL (saved to localStorage)
    const REFRESH_INTERVAL = 30;

    let projectRef = "";
    let anonKey = "";
    let sb = null; // Supabase client instance
    let authMode = null; // "jwt" | "apikey"
    let apiKey = "";
    let accessToken = "";
    let countdown = REFRESH_INTERVAL;
    let timer = null;

    function getApiUrl() {
      return "https://" + projectRef + ".supabase.co/functions/v1/open-brain-dashboard";
    }

    // --- Init ---

    async function init() {
      var params = new URLSearchParams(window.location.search);
      projectRef = params.get("project") || localStorage.getItem("ob-project-ref") || DEFAULT_PROJECT_REF;
      anonKey = params.get("anon_key") || localStorage.getItem("ob-anon-key") || DEFAULT_ANON_KEY;

      localStorage.setItem("ob-project-ref", projectRef);
      if (anonKey) localStorage.setItem("ob-anon-key", anonKey);

      // Initialize Supabase client if we have an anon key
      if (anonKey) {
        var supabaseUrl = "https://" + projectRef + ".supabase.co";
        sb = supabase.createClient(supabaseUrl, anonKey);

        // Check for existing session (handles OAuth redirect callback too)
        var { data: { session } } = await sb.auth.getSession();
        if (session) {
          accessToken = session.access_token;
          authMode = "jwt";
          showUserInfo(session.user);
          showDashboard();
          listenForAuthChanges();
          return;
        }

        // Enable social login buttons
        document.getElementById("github-btn").addEventListener("click", function () {
          signInWith("github");
        });
        document.getElementById("google-btn").addEventListener("click", function () {
          signInWith("google");
        });
      } else {
        // No anon key — disable social buttons, show hint
        document.getElementById("github-btn").disabled = true;
        document.getElementById("google-btn").disabled = true;
        document.getElementById("github-btn").style.opacity = "0.4";
        document.getElementById("google-btn").style.opacity = "0.4";
      }

      // Check for API key auth
      apiKey = params.get("key") || localStorage.getItem("ob-api-key") || "";
      if (apiKey) {
        authMode = "apikey";
        localStorage.setItem("ob-api-key", apiKey);
        showDashboard();
        return;
      }

      document.getElementById("setup").style.display = "block";
    }

    async function signInWith(provider) {
      if (!sb) return;
      await sb.auth.signInWithOAuth({
        provider: provider,
        options: { redirectTo: window.location.origin + window.location.pathname },
      });
    }

    function listenForAuthChanges() {
      if (!sb) return;
      sb.auth.onAuthStateChange(function (event, session) {
        if (event === "TOKEN_REFRESHED" && session) {
          accessToken = session.access_token;
        }
        if (event === "SIGNED_OUT") {
          accessToken = "";
          authMode = null;
          clearInterval(timer);
          document.getElementById("dashboard").style.display = "none";
          document.getElementById("user-info").style.display = "none";
          document.getElementById("setup").style.display = "block";
        }
      });
    }

    function showUserInfo(user) {
      if (!user) return;
      var userInfo = document.getElementById("user-info");
      var avatar = document.getElementById("user-avatar");
      var nameEl = document.getElementById("user-name");

      var displayName =
        user.user_metadata?.full_name ||
        user.user_metadata?.preferred_username ||
        user.email ||
        "User";
      var avatarUrl = user.user_metadata?.avatar_url;

      nameEl.textContent = displayName;
      if (avatarUrl) {
        avatar.src = avatarUrl;
        avatar.style.display = "block";
      } else {
        avatar.style.display = "none";
      }
      userInfo.style.display = "flex";
    }

    function showDashboard() {
      document.getElementById("setup").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      fetchData();
      timer = setInterval(tick, 1000);
    }

    // --- API key connect ---

    document.getElementById("connect-btn").addEventListener("click", function () {
      var val = document.getElementById("key-input").value.trim();
      if (!val) return;
      apiKey = val;
      authMode = "apikey";
      localStorage.setItem("ob-api-key", apiKey);
      showDashboard();
    });

    document.getElementById("key-input").addEventListener("keydown", function (e) {
      if (e.key === "Enter") document.getElementById("connect-btn").click();
    });

    // --- Sign out ---

    document.getElementById("sign-out-btn").addEventListener("click", async function () {
      if (sb) await sb.auth.signOut();
      localStorage.removeItem("ob-api-key");
      apiKey = "";
      accessToken = "";
      authMode = null;
      clearInterval(timer);
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("user-info").style.display = "none";
      document.getElementById("setup").style.display = "block";
    });

    // --- Rendering (all via textContent / DOM — no innerHTML) ---

    function formatTime(iso) {
      if (!iso) return "unknown";
      return new Date(iso).toLocaleString();
    }

    function truncate(str, len) {
      if (!str) return "";
      return str.length > len ? str.slice(0, len) + "..." : str;
    }

    function clearChildren(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function renderAgents(agents) {
      var grid = document.getElementById("agent-grid");
      clearChildren(grid);
      if (!agents || agents.length === 0) {
        var empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No agent activity in this period.";
        grid.appendChild(empty);
        return;
      }
      for (var i = 0; i < agents.length; i++) {
        var a = agents[i];
        var card = document.createElement("div");
        card.className = "agent-card";

        var name = document.createElement("div");
        name.className = "agent-name";
        name.textContent = a.agent || "unknown";
        card.appendChild(name);

        var count = document.createElement("div");
        count.className = "agent-stat";
        count.textContent = a.thought_count + " thought" + (a.thought_count !== 1 ? "s" : "");
        card.appendChild(count);

        var last = document.createElement("div");
        last.className = "agent-stat";
        last.textContent = "Last active: " + formatTime(a.last_active);
        card.appendChild(last);

        grid.appendChild(card);
      }
    }

    function renderTimeline(recent) {
      var list = document.getElementById("timeline");
      clearChildren(list);
      if (!recent || recent.length === 0) {
        var empty = document.createElement("li");
        empty.className = "empty-state";
        empty.textContent = "No recent thoughts.";
        list.appendChild(empty);
        return;
      }
      for (var i = 0; i < recent.length; i++) {
        var t = recent[i];
        var li = document.createElement("li");

        var meta = document.createElement("div");
        meta.className = "meta";

        var agentSpan = document.createElement("span");
        agentSpan.className = "agent";
        agentSpan.textContent = t.agent || "unknown";
        meta.appendChild(agentSpan);

        var typeSpan = document.createElement("span");
        typeSpan.className = "type";
        typeSpan.textContent = t.type || "unknown";
        meta.appendChild(typeSpan);

        var timeSpan = document.createElement("span");
        timeSpan.className = "time";
        timeSpan.textContent = formatTime(t.created_at);
        meta.appendChild(timeSpan);

        li.appendChild(meta);

        var preview = document.createElement("div");
        preview.className = "content-preview";
        preview.textContent = truncate(t.content, 150);
        li.appendChild(preview);

        list.appendChild(li);
      }
    }

    async function fetchData() {
      var dot = document.getElementById("status-dot");
      var refreshText = document.getElementById("refresh-text");
      var errorBanner = document.getElementById("error-banner");

      dot.classList.add("loading");
      refreshText.textContent = "Refreshing...";

      try {
        var fetchUrl = getApiUrl();
        var fetchOpts = {};

        if (authMode === "jwt") {
          fetchOpts.headers = { "Authorization": "Bearer " + accessToken };
        } else {
          fetchUrl += "?key=" + encodeURIComponent(apiKey);
        }

        var res = await fetch(fetchUrl, fetchOpts);
        if (!res.ok) {
          if (res.status === 401) {
            if (authMode === "apikey") localStorage.removeItem("ob-api-key");
            if (sb && authMode === "jwt") await sb.auth.signOut();
            apiKey = "";
            accessToken = "";
            authMode = null;
            clearInterval(timer);
            document.getElementById("dashboard").style.display = "none";
            document.getElementById("user-info").style.display = "none";
            document.getElementById("setup").style.display = "block";
            return;
          }
          throw new Error("HTTP " + res.status);
        }
        var data = await res.json();

        errorBanner.style.display = "none";

        var summary = data.summary || {};
        document.getElementById("summary-line").textContent =
          summary.total_thoughts + " thoughts from " +
          summary.active_agents + " agent" + (summary.active_agents !== 1 ? "s" : "") +
          " in the last " + summary.hours + "h";

        renderAgents(data.by_agent || []);
        renderTimeline(data.recent || []);
      } catch (e) {
        errorBanner.style.display = "block";
        errorBanner.textContent = "Failed to load data: " + e.message;
      } finally {
        dot.classList.remove("loading");
        countdown = REFRESH_INTERVAL;
      }
    }

    function tick() {
      countdown--;
      if (countdown <= 0) {
        fetchData();
      } else {
        document.getElementById("refresh-text").textContent = "Auto-refresh in " + countdown + "s";
      }
    }

    init();
  </script>
</body>
</html>
